services:
  postgres:
    image: postgres:16-alpine
    container_name: ailumia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ailumia
      POSTGRES_USER: ailumia
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_strong_password}
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - ailumia-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ailumia"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: ailumia-backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ailumia-net

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: https://api.gammar.cloud/api
    container_name: ailumia-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - ailumia-net

  nginx:
    image: nginx:alpine
    container_name: ailumia-nginx
    restart: unless-stopped
    ports:
      - "0.0.0.0:80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - ailumia-net

  prometheus:
    image: prom/prometheus:latest
    container_name: ailumia-prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
    depends_on:
      - backend
    networks:
      - ailumia-net

  grafana:
    image: grafana/grafana:latest
    container_name: ailumia-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-grafana_change_me}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: https://grafana.gammar.cloud
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - ailumia-net

volumes:
  pg-data:
  prometheus-data:
  grafana-data:

networks:
  ailumia-net:
    driver: bridge
