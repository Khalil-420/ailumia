events {}

http {
    # Default server — catches requests by IP or unknown hostnames → frontend
    server {
        listen 80 default_server;
        server_name _;

        location / {
            proxy_pass http://ailumia-frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # dashboard.gammar.cloud → frontend container
    server {
        listen 80;
        server_name dashboard.gammar.cloud;

        location / {
            proxy_pass http://ailumia-frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # api.gammar.cloud → backend container
    server {
        listen 80;
        server_name api.gammar.cloud;

        client_max_body_size 30m;

        location / {
            proxy_pass http://ailumia-backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }
    }
}
