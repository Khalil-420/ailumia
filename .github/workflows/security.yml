name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gitleaks:
    name: Gitleaks — Secret Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  semgrep:
    name: Semgrep — SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config auto \
            --config p/python \
            --config p/javascript \
            --config p/react \
            --config p/security-audit \
            --config p/owasp-top-ten \
            --error \
            --json \
            --output semgrep-results.json \
            . || true

      - name: Upload Semgrep results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-results
          path: semgrep-results.json

  trivy:
    name: Trivy — Container Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t ailumia-backend:scan ./backend

      - name: Build frontend image
        run: docker build -t ailumia-frontend:scan ./frontend

      - name: Scan backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ailumia-backend:scan
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
          output: trivy-backend.txt

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ailumia-frontend:scan
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
          output: trivy-frontend.txt

      - name: Upload Trivy results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-results
          path: |
            trivy-backend.txt
            trivy-frontend.txt
